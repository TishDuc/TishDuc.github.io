<!DOCTYPE html>
<html>
<head>
    <title>My Data Viz Site</title>
</head>
<body>
    <h1>Hello World!</h1>
    <p>This site will soon contain interactive data visualizations about crime in San Francisco.</p>

    <h2>Static Visualizations</h2>
    <h3>Conditional Crime Profile Heatmap</h3>
    <img src="visualizations/conditional_crime_profile_heatmap.svg"
         alt="Conditional Crime Profile Heatmap"
         width="800">

    <h3>Yearly Focus Crime Counts</h3>
    <img src="visualizations/yearly_focus_crime_counts.svg"
         alt="Yearly Focus Crime Counts"
         width="800">

    <h2>Interactive Visualizations</h2>

    <h3>Burglary Heatmap</h3>
    <iframe src="visualizations/burglary_heatmap.html"
            width="100%"
            height="600"
            frameborder="0"></iframe>

    <h3>Drug Crime Folium Map</h3>
    <iframe src="visualizations/drug_crime_folium_map.html"
            width="100%"
            height="600"
            frameborder="0"></iframe>

    <h3>Drug Offense Ratios Choropleth</h3>
    <iframe src="visualizations/drug_offense_ratios_choropleth.html"
            width="100%"
            height="600"
            frameborder="0"></iframe>

</body>
</html>
