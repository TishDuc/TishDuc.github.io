<html lang="en">

<head>

    <style>
        :root {
            --main-width: 900px;
        }

        .title {
            font-family: Helvetica, sans-serif;
            font-size: 28px;
            color: #444;
            letter-spacing: 1px;
            line-height: 1.8;
            font-weight: 300;
            background-color: transparent;
            padding: 0;
        }

        .text {
            font-size: 15 px;
            line-height: 2;
            text-align: left;
            max-width: var(--main-width);
            margin: 20 auto;
            color: #2f2f2f;
        }

        body {
            font-family: Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            background-color: #ecece3;
            overflow-x: hidden;
        }

        section p a {
            display: inline;
            width: auto;
            margin: 0;
            padding: 0;
            border: none;
            background: none;
            font-size: inherit;

            color: #1b5e4b;          /* green text */
            text-decoration: underline;
        }

        section p a:hover {
            color: #145a3a;          /* slightly darker on hover */
        }

        .caption {
            text-align: center;
            font-size: 13px;
            line-height: 1.5;
            color: #555;
            margin-top: 8px;
        }

        .references {
            text-align: left;
            line-height: 1.6;
            background-color: transparent;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: var(--main-width);
            padding: 40px 20px;
        }

        a {
            color: #1b5e4b;
            text-decoration: underline;
            display: inline;
            margin: 0;
            padding: 0;
            width: auto;
            border: none;
            border-radius: 0;
            font-size: inherit;
            background-color: transparent;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #0f4a3a;
            text-decoration: underline;
        }

        /* Optional: use class="button-link" if you want the old button-style links. */
        .button-link {
            display: block;
            margin: 15px auto;
            padding: 12px 24px;
            width: 320px;
            border: 2px solid #d3d3d3;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            background-color: rgba(255, 255, 255, 0.7);
        }

        .button-link:hover {
            border-color: #bfe3a3;
            background-color: #f0fae6;
            color: #1b5e4b;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        section {
            max-width: var(--main-width);
            margin-bottom: 60px;
            background-color: rgba(255,255,255,0.7);
            padding: 20px 50px;
            border-radius: 8px;
        }

        img, iframe {
            width: 100%;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>



<canvas id="particles"></canvas>

    <div class="container">

        <section class="title">
            Displacements around the globe <br>
            from 1962 to 2025

        </section>

    </div>
